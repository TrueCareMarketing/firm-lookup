<title>Intake — State &amp; Firm Lookup</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#3a4149;color:#e8ecf0;}
.header{background:#2c3238;border-bottom:1px solid #1e2428;padding:11px 24px;display:flex;align-items:center;justify-content:space-between;height:46px;}
.header-logo{font-size:15px;font-weight:600;color:#e8ecf0;letter-spacing:0.01em;}
.header-logo span{color:#6db890;margin-right:5px;}
.header-right{display:flex;align-items:center;gap:12px;}
.counter{font-size:13px;color:#8a9aa8;letter-spacing:0.02em;}
.export-btn{font-size:13px;padding:4px 11px;border-radius:5px;background:#3d5a78;color:#a8d0f0;border:1px solid #4a6a88;cursor:pointer;font-weight:600;display:none;transition:background 0.15s;}
.export-btn:hover{background:#4a6a8a;}
.export-btn.visible{display:inline-block;}
.app{display:flex;height:calc(100vh - 46px);overflow:hidden;}
.panel-left{width:280px;min-width:180px;max-width:480px;background:#2e353c;border-right:1px solid #1e2428;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.resizer{width:5px;background:transparent;cursor:col-resize;flex-shrink:0;position:relative;z-index:10;}
.resizer:hover,.resizer.dragging{background:#4a5560;}
.panel-right{flex:1;overflow-y:auto;background:#3a4149;min-width:0;}
.panel-right-inner{padding:28px 32px;max-width:860px;}
.left-top{padding:12px 12px 0;flex-shrink:0;}
.left-list{flex:1;overflow-y:auto;padding:0 12px 12px;}
.left-list::-webkit-scrollbar{width:3px;}
.left-list::-webkit-scrollbar-track{background:transparent;}
.left-list::-webkit-scrollbar-thumb{background:#4a5560;border-radius:3px;}
.abar{border-radius:6px;padding:7px 10px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:5px;font-size:13px;}
.abar.locked{background:#363d45;border:1px solid #4a5560;}
.abar.unlocked{background:#2a4038;border:1px solid #3a6848;}
.abar .lbl{font-weight:500;color:#8a9aa8;}
.abar.unlocked .lbl{color:#6db890;}
.mode-toggle{display:flex;border-radius:7px;overflow:hidden;border:1px solid #4a5560;margin-bottom:8px;background:#363d45;}
.mode-btn{flex:1;font-size:12px;font-weight:600;padding:6px 0;border:none;cursor:pointer;transition:all 0.15s;letter-spacing:0.03em;color:#8a9aa8;background:transparent;}
.mode-btn.active{background:#4a5560;color:#e8ecf0;box-shadow:inset 0 1px 3px rgba(0,0,0,0.3);}
.mode-btn:not(.active):hover{background:#404850;color:#c0ccd8;}
.search-wrap{margin-bottom:10px;position:relative;}
.search-wrap input{width:100%;font-size:14px;padding:8px 11px 8px 30px;border:1px solid #4a5560;border-radius:6px;background:#363d45;color:#e8ecf0;outline:none;transition:border 0.15s;}
.search-wrap input:focus{border-color:#6db890;background:#3d4550;box-shadow:0 0 0 2px rgba(109,184,144,0.15);}
.search-wrap input::placeholder{color:#5a6878;}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:#5a6878;font-size:14px;pointer-events:none;}
.firm-result-group{margin-bottom:16px;}
.firm-result-state-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:#a0b0c0;background:#363d45;border:1px solid #4a5560;border-radius:5px;padding:4px 9px;margin-bottom:6px;display:inline-block;cursor:pointer;}
.firm-result-state-label:hover{background:#4a5560;color:#e8ecf0;}
.firm-result-empty{font-size:14px;color:#5a6878;padding:24px 0;text-align:center;}
.hint{font-size:12px;color:#5a6878;margin-bottom:8px;letter-spacing:0.02em;}
.state-row{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;background:#363d45;border:1px solid #4a5560;border-radius:6px;margin-bottom:3px;cursor:pointer;transition:all 0.1s;}
.state-row:hover{background:#404850;border-color:#5a6878;}
.state-row.active-state{background:#2a3d50;border-color:#4a7a9a;box-shadow:0 0 0 1px #4a7a9a;}
.sr-left{display:flex;align-items:center;gap:9px;}
.sr-abbr{font-size:12px;font-weight:700;color:#5a7a8a;min-width:24px;letter-spacing:0.04em;}
.sr-name{font-size:14px;color:#c8d8e8;font-weight:400;}
.sr-right{display:flex;align-items:center;gap:5px;}
.sr-arrow{color:#5a6878;font-size:13px;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100vh - 100px);color:#4a5560;text-align:center;padding:40px;}
.empty-icon{font-size:32px;margin-bottom:14px;opacity:0.4;}
.empty-title{font-size:16px;color:#5a6878;font-weight:500;margin-bottom:5px;}
.empty-sub{font-size:14px;color:#4a5560;}
.state-map-wrap{width:100%;max-width:360px;margin:0 auto 20px;border-radius:10px;overflow:hidden;border:1px solid #4a5560;background:#2e353c;}
.state-map-wrap iframe{display:block;width:100%;height:200px;border:none;}
.state-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.sname{font-size:24px;font-weight:600;color:#e8ecf0;}
.state-info-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.state-info-block{background:#363d45;border:1px solid #4a5560;border-radius:8px;padding:12px 14px;}
.state-info-block .sib-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#6a8a9a;margin-bottom:6px;}
.state-info-block .sib-value{font-size:14px;color:#c8d8e8;line-height:1.65;white-space:pre-wrap;}
.state-info-block .sib-value.empty{color:#4a5560;font-style:italic;}
.state-info-block textarea{width:100%;font-size:14px;color:#e8ecf0;background:#2e353c;border:1px solid #6db890;border-radius:6px;padding:8px 11px;line-height:1.6;resize:vertical;min-height:65px;outline:none;font-family:inherit;}
.state-info-block textarea:focus{box-shadow:0 0 0 2px rgba(109,184,144,0.2);}
.sib-save-row{display:flex;gap:6px;justify-content:flex-end;margin-top:6px;}
.sib-save-row span{font-size:11px;color:#5a6878;align-self:center;}
.sec-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:#6a8a9a;margin:18px 0 9px;display:flex;align-items:center;gap:8px;}
.sec-title::after{content:'';flex:1;height:1px;background:#4a5560;}
.right-admin-bar{display:flex;align-items:center;gap:8px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid #4a5560;}
.firm-card{background:#363d45;border:1px solid #4a5560;border-radius:9px;margin-bottom:8px;transition:border-color 0.2s;}
.firm-card:hover{border-color:#6a8a9a;}
.firm-card.closed{opacity:0.5;}
.firm-card-header{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 16px;cursor:default;user-select:none;}
.firm-header-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.firm-collapse-icon{font-size:11px;color:#5a7080;transition:transform 0.2s;flex-shrink:0;width:14px;text-align:center;}
.firm-card:hover .firm-collapse-icon{transform:rotate(90deg);color:#a0b8c8;}
.firm-name{font-size:15px;font-weight:600;color:#e8ecf0;line-height:1.3;}
.firm-updated{font-size:11px;color:#5a6878;margin-top:1px;letter-spacing:0.02em;}
.firm-card-body{display:none;padding:0 16px 14px;border-top:1px solid #4a5560;}
.firm-card:hover .firm-card-body{display:block;}
.firm-section{border-top:1px solid #404850;margin-top:9px;padding-top:9px;}
.firm-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#6a8a9a;margin-bottom:5px;}
.firm-section-val{font-size:13px;color:#c8d8e8;line-height:1.6;white-space:pre-wrap;}
.firm-section-val.empty{color:#4a5560;font-style:italic;}
.badges{display:flex;gap:4px;flex-wrap:wrap;align-items:center;flex-shrink:0;}
.badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap;letter-spacing:0.02em;}
.b-green{background:#1e3d2a;color:#6db890;border:1px solid #2e5a3a;}
.b-red{background:#3d1e1e;color:#e08080;border:1px solid #5a2e2e;}
.b-blue{background:#1e2e3d;color:#7ab0d8;border:1px solid #2e4a5a;}
.b-amber{background:#3d2e1a;color:#d8a860;border:1px solid #5a4428;}
.b-gray{background:#404850;color:#8a9aa8;border:1px solid #5a6878;}
.req-grid{display:flex;flex-direction:column;gap:0;margin-bottom:9px;border:1px solid #4a5560;border-radius:6px;overflow:hidden;}
.req{display:flex;align-items:baseline;gap:10px;padding:7px 13px;border-bottom:1px solid #404850;background:#363d45;}
.req:last-child{border-bottom:none;}
.req:nth-child(even){background:#323940;}
.req-lbl{font-size:12px;font-weight:600;color:#7a9ab0;min-width:160px;flex-shrink:0;letter-spacing:0.02em;}
.req-val{font-size:14px;color:#c8d8e8;line-height:1.5;}
.rep-note{background:#2e2a1a;border:1px solid #5a4a20;border-radius:6px;padding:9px 12px;font-size:14px;color:#c8a860;line-height:1.65;border-left:3px solid #7a6030;margin-top:9px;}
.rep-note strong{font-weight:700;color:#d8b870;}
.btn{font-size:13px;padding:5px 11px;border-radius:6px;border:1px solid #4a5560;background:#404850;color:#c0ccd8;cursor:pointer;transition:all 0.12s;font-weight:500;}
.btn:hover{background:#4a5560;color:#e8ecf0;}
.btn-green{background:#1e3d2a;color:#6db890;border-color:#2e5a3a;}
.btn-green:hover{background:#254a33;}
.btn-red{background:#3d1e1e;color:#e08080;border-color:#5a2e2e;}
.btn-red:hover{background:#4a2424;}
.btn-blue{background:#1e2e3d;color:#7ab0d8;border-color:#2e4a5a;}
.btn-blue:hover{background:#243850;}
.btn-sm{font-size:12px;padding:3px 8px;}
.no-result{font-size:14px;color:#5a6878;padding:20px 0;text-align:center;}
.speak-btn{background:none;border:none;cursor:pointer;font-size:15px;padding:0 3px;opacity:0.5;transition:opacity 0.15s;line-height:1;vertical-align:middle;margin-left:5px;}
.speak-btn:hover{opacity:0.9;}
.speak-btn.speaking{opacity:1;animation:pulse 0.8s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:#363d45;border-radius:12px;border:1px solid #4a5560;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:24px;box-shadow:0 8px 40px rgba(0,0,0,0.4);}
.modal h2{font-size:18px;font-weight:600;margin-bottom:20px;color:#e8ecf0;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;font-weight:700;color:#6a8a9a;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.06em;}
.field input,.field textarea,.field select{width:100%;font-size:14px;padding:8px 11px;border:1px solid #4a5560;border-radius:6px;background:#2e353c;color:#e8ecf0;outline:none;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:#6db890;box-shadow:0 0 0 2px rgba(109,184,144,0.15);background:#323940;}
.field textarea{resize:vertical;min-height:70px;line-height:1.5;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid #4a5560;}
.err{font-size:13px;color:#e08080;margin-top:5px;text-align:center;}
small.helper{display:block;margin-top:4px;color:#8a9aa8;font-size:12px}
</style>
</head>

async function loadDataFromCloud() {
  const { ref, get, set } = window.firebaseFns;
  const db = window.firebaseDb;
  try {
    const snapshot = await get(ref(db, "portalData"));
    if (snapshot.exists()) {
      appData = snapshot.val();
    } else {
      appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
      await set(ref(db, "portalData"), appData);
    }
  } catch (err) {
    console.error("Load failed:", err);
    appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
  }
  fullRender();
}

async function saveData() {
  const { ref, set } = window.firebaseFns;
  const db = window.firebaseDb;
  try {
    await set(ref(db, "portalData"), appData);
    const btn = document.getElementById("exportBtn");
    if (btn) {
      const old = btn.textContent;
      btn.textContent = "✓ Saved";
      setTimeout(() => btn.textContent = old, 1500);
    }
  } catch (err) {
    console.error("Save failed:", err);
    alert("Could not save changes.");
  }
}
window.saveData = saveData;

function firmCard(f,sk){
  const adminBtns=adminUnlocked?`<div style="display:flex;gap:5px;margin-left:8px;" onclick="event.stopPropagation()"><button class="btn btn-sm btn-blue" onclick="openEditFirm('${sk}','${f.id}')">Edit</button><button class="btn btn-sm btn-red" onclick="deleteFirm('${sk}','${f.id}')">Remove</button></div>`:"";
  const rows=[[f.minPD,"Min. property damage"],[f.trtNoTrt,"No treatment window"],[f.trtWithTrt,"With treatment window"],[f.geographic,"Geographic coverage"],[f.requirements,"Requirements"],[f.exclusions,"Exclusions"],[f.marketing,"Intake Source"],[f.contact,"Contact / link"]].filter(r=>r[0]);
  const contactVal=(v,l)=>{if(l!=="Contact / link")return`<div class="req-val">${v}</div>`;const isUrl=/^https?:\/\//i.test(v)||/^www\./i.test(v);const href=v.startsWith("http")?v:"https://"+v;return isUrl?`<div class="req-val"><a href="${href}" target="_blank" rel="noopener" style="color:#7ab0d8;text-decoration:underline;">${v}</a></div>`:`<div class="req-val">${v}</div>`;};
  const speakBtn=f.pronunciation?`<button class="speak-btn" data-id="${f.id}" title="Hear pronunciation" onclick="event.stopPropagation();speakFirm('${f.id}',\`${(f.pronunciation||"").replace(/`/g,"'")}\`)">🔊</button>`:"";
  const updatedLine=f.lastUpdated?`<div class="firm-updated">Updated: ${f.lastUpdated}</div>`:"";
  const extraSections=[["Fault Type",f.faultType],["Key Threshold",f.keyThreshold],["Sign the Lead When",f.signWhen],["Do Not Sign When",f.doNotSign],["State-Specific Disqualifiers",f.disqualifiers]].filter(([,v])=>v);
  return`<div class="firm-card${f.accepting?"":" closed"}">
    <div class="firm-card-header">
      <div class="firm-header-left">
        <span class="firm-collapse-icon">▶</span>
        <div><div class="firm-name">${f.name}${speakBtn}</div>${updatedLine}</div>
      </div>
      <div style="display:flex;align-items:center;gap:4px;">
        <div class="badges">${pb(f.priority)}${ab(f.accepting)}${mb(f.minors)}</div>
        ${adminBtns}
      </div>
    </div>
    <div class="firm-card-body">
      <div class="req-grid" style="margin-top:12px;">${rows.map(([v,l])=>`<div class="req"><div class="req-lbl">${l}</div>${contactVal(v,l)}</div>`).join("")}</div>
      ${f.notes?`<div class="rep-note"><strong>Rep note:</strong> ${f.notes}</div>`:""}
      ${extraSections.map(([l,v])=>`<div class="firm-section"><div class="firm-section-title">${l}</div><div class="firm-section-val">${v}</div></div>`).join("")}
    </div>
  </div>`;
}

function stateMapEmbed(stateName){
  const q=encodeURIComponent(stateName+", USA");
  return`<div class="state-map-wrap"><iframe src="https://maps.google.com/maps?q=${q}&z=5&output=embed" loading="lazy" title="${stateName} map"></iframe></div>`;
}

function renderFirmList(){
  const q=search.toLowerCase().trim();
  if(!q)return`<div class="firm-result-empty">Type a firm name to search</div>`;
  const results=[];
  Object.keys(appData).sort().forEach(stateName=>{
    const matched=appData[stateName].firms.filter(f=>f.name.toLowerCase().includes(q));
    if(matched.length)results.push({stateName,firms:matched});
  });
  if(!results.length)return`<div class="firm-result-empty">No firms match "${search}"</div>`;
  const totalFirms=results.reduce((a,r)=>a+r.firms.length,0);
  return`<p class="hint">${totalFirms} firm${totalFirms!==1?"s":""} in ${results.length} state${results.length!==1?"s":""}</p>`+
    results.map(({stateName,firms})=>
      `<div class="firm-result-group"><div class="firm-result-state-label" onclick="viewState('${stateName}');setSearchMode('state');">${appData[stateName].abbr} — ${stateName}</div>`+
      firms.map(f=>firmCard(f,stateName)).join("")+
      `</div>`
    ).join("");
}

function renderList(){
  if(searchMode==="firm")return renderFirmList();
  const sorted=Object.keys(appData).sort();
  const q=search.toLowerCase();
  const filtered=q?sorted.filter(s=>s.toLowerCase().includes(q)||appData[s].abbr.toLowerCase()===q):sorted;
  if(!filtered.length)return`<div class="no-result">No states match</div>`;
  const rows=filtered.map(s=>{
    const activeClass=curState===s?" active-state":"";
    return`<div class="state-row${activeClass}" onclick="viewState('${s}')"><div class="sr-left"><span class="sr-abbr">${appData[s].abbr}</span><span class="sr-name">${s}</span></div><div class="sr-right"><span class="sr-arrow">›</span></div></div>`;
  }).join("");
  const addBtn=adminUnlocked?`<div style="margin-top:10px;"><button class="btn btn-blue btn-sm" onclick="openAddState()">+ Add state</button></div>`:"";
  return`<p class="hint">${filtered.length} states</p>${rows}${addBtn}`;
}

      <div class="state-info-block"><div class="sib-label">Sign the Lead When</div><textarea id="inlineStateSignWhen" placeholder="Enter conditions…">${s.stateSignWhen||""}</textarea><div class="sib-save-row"><span>Admin edit</span><button class="btn btn-sm btn-green" onclick="saveInlineField('${key}','stateSignWhen','inlineStateSignWhen')">Save</button></div></div>
      <div class="state-info-block"><div class="sib-label">Do Not Sign When</div><textarea id="inlineStateDoNotSign" placeholder="Enter conditions…">${s.stateDoNotSign||""}</textarea><div class="sib-save-row"><span>Admin edit</span><button class="btn btn-sm btn-green" onclick="saveInlineField('${key}','stateDoNotSign','inlineStateDoNotSign')">Save</button></div></div>
      <div class="state-info-block"><div class="sib-label">State-Specific Disqualifiers</div><textarea id="inlineStateDisqualifiers" placeholder="Enter disqualifiers…">${s.stateDisqualifiers||""}</textarea><div class="sib-save-row"><span>Admin edit</span><button class="btn btn-sm btn-green" onclick="saveInlineField('${key}','stateDisqualifiers','inlineStateDisqualifiers')">Save</button></div></div>
    </div>`;
  } else {
    const sfv=(v)=>v?`<div class="sib-value">${v}</div>`:`<div class="sib-value empty">Not set</div>`;
    infoHtml=`<div class="state-info-grid">
      <div class="state-info-block"><div class="sib-label">Fault Type</div>${sfv(s.stateFaultType)}</div>
      <div class="state-info-block"><div class="sib-label">Key Threshold</div>${sfv(s.stateKeyThreshold)}</div>
      <div class="state-info-block"><div class="sib-label">Sign the Lead When</div>${sfv(s.stateSignWhen)}</div>
      <div class="state-info-block"><div class="sib-label">Do Not Sign When</div>${sfv(s.stateDoNotSign)}</div>
      <div class="state-info-block"><div class="sib-label">State-Specific Disqualifiers</div>${sfv(s.stateDisqualifiers)}</div>
    </div>`;
  }
  return`<div class="state-header"><span class="sname">${key} (${s.abbr})</span></div>${stateMapEmbed(key)}${infoHtml}${adminBtns}${active.length?`<div class="sec-title">Accepting leads</div>`+active.map(f=>firmCard(f,key)).join(""):""} ${closed.length?`<div class="sec-title">Not currently accepting</div>`+closed.map(f=>firmCard(f,key)).join(""):""} ${!active.length&&!closed.length?`<div class="no-result" style="margin-top:24px;">No firms assigned yet.</div>`:""}`;
}

function buildModal(){
  if(!modalMode)return"";
  if(modalMode==="pw")return`<div class="overlay" id="ov" onclick="if(event.target.id==='ov')closeModal()"><div class="modal"><h2>Admin login</h2><div class="field"><label>Password</label><input type="password" id="pwf" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')submitPw()"/><small class="helper">Uses your Firebase email/password account.</small></div><div class="err" id="pwerr"></div><div class="modal-footer"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-green" onclick="submitPw()">Unlock</button></div></div></div>`;
  if(modalMode==="firm"&&editDraft){
    const d=editDraft;
    const fields=[["name","Firm name","text"],["pronunciation","Pronunciation (phonetic)","text"],["minPD","Min. property damage","text"],["trtNoTrt","No treatment window","text"],["trtWithTrt","With treatment window","text"],["geographic","Geographic coverage","text"],["requirements","Requirements","textarea"],["exclusions","Exclusions","text"],["marketing","Intake Source","text"],["contact","Contact / link","text"],["notes","Rep note","textarea"],["faultType","Fault Type","textarea"],["keyThreshold","Key Threshold","textarea"],["signWhen","Sign the Lead When","textarea"],["doNotSign","Do Not Sign When","textarea"],["disqualifiers","State-Specific Disqualifiers","textarea"],["lastUpdated","Last Updated (e.g. Apr 21, 2026)","text"]];
    return`<div class="overlay" id="ov" onclick="if(event.target.id==='ov')closeModal()"><div class="modal"><h2>${d._new?"Add firm":"Edit firm"}</h2><div class="two-col"><div class="field"><label>Status</label><select id="ef_a"><option value="true" ${d.accepting!==false?"selected":""}>Accepting</option><option value="false" ${d.accepting===false?"selected":""}>Not accepting</option></select></div><div class="field"><label>Priority</label><select id="ef_p">${["High","Medium","Paused"].map(p=>`<option ${d.priority===p?"selected":""}>${p}</option>`).join("")}</select></div></div><div class="field"><label>Minor policy</label><select id="ef_m"><option value="No minors unless catastrophic" ${(d.minors||"")==="No minors unless catastrophic"?"selected":""}>No minors unless catastrophic</option><option value="16 Years Old" ${(d.minors||"")==="16 Years Old"?"selected":""}>16 Years Old</option><option value="" ${!d.minors?"selected":""}>No restriction</option></select></div>${fields.map(([k,l,t])=>`<div class="field"><label>${l}</label>${t==="textarea"?`<textarea id="ef_${k}">${d[k]||""}</textarea>`:`<input type="text" id="ef_${k}" value="${(d[k]||"").replace(/"/g,"&quot;")}"/>`}</div>`).join("")}<div class="modal-footer"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-green" onclick="saveFirmEdit()">Save</button></div></div></div>`;
  }
  if(modalMode==="state"&&stateDraft)return`<div class="overlay" id="ov" onclick="if(event.target.id==='ov')closeModal()"><div class="modal"><h2>Edit state</h2><div class="two-col"><div class="field"><label>State name</label><input type="text" id="es_n" value="${stateDraft.key}"/></div><div class="field"><label>Abbreviation</label><input type="text" id="es_a" value="${stateDraft.abbr}"/></div></div><div class="field"><label>Fault Type</label><textarea id="es_sft">${stateDraft.stateFaultType||""}</textarea></div><div class="field"><label>Key Threshold</label><textarea id="es_skt">${stateDraft.stateKeyThreshold||""}</textarea></div><div class="field"><label>Sign the Lead When</label><textarea id="es_ssw">${stateDraft.stateSignWhen||""}</textarea></div><div class="field"><label>Do Not Sign When</label><textarea id="es_sdns">${stateDraft.stateDoNotSign||""}</textarea></div><div class="field"><label>State-Specific Disqualifiers</label><textarea id="es_sdq">${stateDraft.stateDisqualifiers||""}</textarea></div><div class="modal-footer"><button class="btn btn-red" onclick="deleteState('${stateDraft.key}')">Delete state</button><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-green" onclick="saveStateEdit('${stateDraft.key}')">Save</button></div></div></div>`;
  if(modalMode==="addstate")return`<div class="overlay" id="ov" onclick="if(event.target.id==='ov')closeModal()"><div class="modal"><h2>Add new state</h2><div class="two-col"><div class="field"><label>State name</label><input type="text" id="as_n" placeholder="e.g. Michigan"/></div><div class="field"><label>Abbreviation</label><input type="text" id="as_a" placeholder="e.g. MI"/></div></div><div class="field"><label>Fault Type</label><textarea id="as_sft" placeholder="e.g. Comparative fault…"></textarea></div><div class="field"><label>Key Threshold</label><textarea id="as_skt" placeholder="e.g. Min $1,000 PD…"></textarea></div><div class="field"><label>Sign the Lead When</label><textarea id="as_ssw" placeholder="Conditions to sign…"></textarea></div><div class="field"><label>Do Not Sign When</label><textarea id="as_sdns" placeholder="Conditions to decline…"></textarea></div><div class="field"><label>State-Specific Disqualifiers</label><textarea id="as_sdq" placeholder="Disqualifying factors…"></textarea></div><div class="modal-footer"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-green" onclick="addState()">Add state</button></div></div></div>`;
  return"";
}

function fullRender(){
  const listEl=document.getElementById("stateList");
  const detailEl=document.getElementById("detailPanel");
  if(listEl)listEl.innerHTML=renderList();
  if(detailEl)detailEl.innerHTML=renderDetail(curState);
  document.getElementById("modalRoot").innerHTML=buildModal();
  updateCounter();
  const sb=document.getElementById("modeStateBtn"),fb=document.getElementById("modeFirmBtn");
  if(sb)sb.className="mode-btn"+(searchMode==="state"?" active":"");
  if(fb)fb.className="mode-btn"+(searchMode==="firm"?" active":"");
  const saveBtn=document.getElementById("exportBtn");
  if(saveBtn) saveBtn.classList.toggle("visible", adminUnlocked);
  if(modalMode==="pw")setTimeout(()=>{const f=document.getElementById("pwf");if(f)f.focus();},30);
}

function setSearchMode(mode){
  searchMode=mode;
  search="";
  const inp=document.getElementById("searchInput");
  if(inp){inp.value="";inp.placeholder=mode==="firm"?"Search law firms…":"Search states…";}
  fullRender();
}
function handleSearch(v){search=v;fullRender();}
function viewState(s){curState=s;fullRender();}
function openAdminPw(){modalMode="pw";fullRender();}
function closeModal(){modalMode=null;editDraft=null;stateDraft=null;fullRender();}

async function submitPw() {
  const email = window.ADMIN_EMAIL || "PASTE_YOUR_ADMIN_EMAIL";
  const password = document.getElementById("pwf").value;
  try {
    await window.firebaseFns.signInWithEmailAndPassword(window.firebaseAuth, email, password);
    modalMode = null;
    fullRender();
  } catch (err) {
    document.getElementById("pwerr").textContent = "Incorrect password or Firebase login not configured.";
  }
}
window.submitPw = submitPw;

function lockAdmin() { window.firebaseFns.signOut(window.firebaseAuth); }
window.lockAdmin = lockAdmin;

function openEditFirm(sk,id){editDraft=Object.assign({_sk:sk},JSON.parse(JSON.stringify(appData[sk].firms.find(f=>f.id===id))));modalMode="firm";fullRender();}
function saveFirmEdit(){const sk=editDraft._sk,firms=appData[sk].firms,idx=firms.findIndex(f=>f.id===editDraft.id);const u={id:editDraft.id,name:document.getElementById("ef_name").value,pronunciation:document.getElementById("ef_pronunciation").value,accepting:document.getElementById("ef_a").value==="true",priority:document.getElementById("ef_p").value,minors:document.getElementById("ef_m").value,marketing:document.getElementById("ef_marketing").value,minPD:document.getElementById("ef_minPD").value,trtNoTrt:document.getElementById("ef_trtNoTrt").value,trtWithTrt:document.getElementById("ef_trtWithTrt").value,geographic:document.getElementById("ef_geographic").value,requirements:document.getElementById("ef_requirements").value,exclusions:document.getElementById("ef_exclusions").value,contact:document.getElementById("ef_contact").value,notes:document.getElementById("ef_notes").value,faultType:document.getElementById("ef_faultType").value,keyThreshold:document.getElementById("ef_keyThreshold").value,signWhen:document.getElementById("ef_signWhen").value,doNotSign:document.getElementById("ef_doNotSign").value,disqualifiers:document.getElementById("ef_disqualifiers").value,lastUpdated:document.getElementById("ef_lastUpdated").value};if(idx>-1)firms[idx]=u;else firms.push(u);saveData();closeModal();}
function deleteFirm(sk,id){if(!confirm("Remove this firm?"))return;appData[sk].firms=appData[sk].firms.filter(f=>f.id!==id);saveData();fullRender();}
let _speakTimer=null;
function speakFirm(id,text){window.speechSynthesis.cancel();const btn=document.querySelector('.speak-btn[data-id="'+id+'"]');if(btn){btn.classList.add("speaking");clearTimeout(_speakTimer);_speakTimer=setTimeout(()=>btn.classList.remove("speaking"),4000);}const u=new SpeechSynthesisUtterance(text);u.rate=0.85;u.pitch=1;u.onend=()=>{if(btn)btn.classList.remove("speaking");};window.speechSynthesis.speak(u);}
function openEditState(key){stateDraft={key,abbr:appData[key].abbr,stateFaultType:appData[key].stateFaultType||"",stateKeyThreshold:appData[key].stateKeyThreshold||"",stateSignWhen:appData[key].stateSignWhen||"",stateDoNotSign:appData[key].stateDoNotSign||"",stateDisqualifiers:appData[key].stateDisqualifiers||""};modalMode="state";fullRender();}
function saveStateEdit(oldKey){const nk=(document.getElementById("es_n").value||oldKey).trim();if(nk!==oldKey){appData[nk]=appData[oldKey];delete appData[oldKey];}appData[nk].abbr=document.getElementById("es_a").value;appData[nk].stateFaultType=document.getElementById("es_sft").value;appData[nk].stateKeyThreshold=document.getElementById("es_skt").value;appData[nk].stateSignWhen=document.getElementById("es_ssw").value;appData[nk].stateDoNotSign=document.getElementById("es_sdns").value;appData[nk].stateDisqualifiers=document.getElementById("es_sdq").value;if(curState===oldKey)curState=nk;saveData();closeModal();}
function deleteState(key){if(!confirm("Delete "+key+"?"))return;delete appData[key];curState=null;saveData();closeModal();}
function openAddState(){modalMode="addstate";fullRender();}
function addState(){const k=(document.getElementById("as_n").value||"").trim();if(!k)return;appData[k]={abbr:document.getElementById("as_a").value||"",notes:"",stateFaultType:document.getElementById("as_sft").value||"",stateKeyThreshold:document.getElementById("as_skt").value||"",stateSignWhen:document.getElementById("as_ssw").value||"",stateDoNotSign:document.getElementById("as_sdns").value||"",stateDisqualifiers:document.getElementById("as_sdq").value||"",firms:[]};curState=k;saveData();closeModal();}
function saveInlineField(key,field,elId){const el=document.getElementById(elId);if(el){appData[key][field]=el.value;saveData();fullRender();}}
function openAddFirm(sk){editDraft={id:uid(),_sk:sk,_new:true,name:"",pronunciation:"",accepting:true,priority:"High",minors:"No minors unless catastrophic",marketing:"Belief Marketing",minPD:"",trtNoTrt:TRT.noTrt,trtWithTrt:TRT.withTrt,geographic:"",requirements:"",exclusions:"",contact:"",notes:"",faultType:"",keyThreshold:"",signWhen:"",doNotSign:"",disqualifiers:"",lastUpdated:""};modalMode="firm";fullRender();}

window.openAdminPw=openAdminPw;window.closeModal=closeModal;window.setSearchMode=setSearchMode;window.handleSearch=handleSearch;window.viewState=viewState;window.openEditFirm=openEditFirm;window.saveFirmEdit=saveFirmEdit;window.deleteFirm=deleteFirm;window.speakFirm=speakFirm;window.openEditState=openEditState;window.saveStateEdit=saveStateEdit;window.deleteState=deleteState;window.openAddState=openAddState;window.addState=addState;window.saveInlineField=saveInlineField;window.openAddFirm=openAddFirm;

(function(){
  const resizer=document.getElementById("resizer");
  const left=document.getElementById("panelLeft");
  let dragging=false,startX=0,startW=0;
  resizer.addEventListener("mousedown",e=>{
    dragging=true;startX=e.clientX;startW=left.offsetWidth;
    resizer.classList.add("dragging");
    document.body.style.cursor="col-resize";
    document.body.style.userSelect="none";
  });
  document.addEventListener("mousemove",e=>{
    if(!dragging)return;
    const w=Math.min(Math.max(startW+(e.clientX-startX),180),520);
    left.style.width=w+"px";
  });
  document.addEventListener("mouseup",()=>{
    if(!dragging)return;
    dragging=false;resizer.classList.remove("dragging");
    document.body.style.cursor="";document.body.style.userSelect="";
  });
})();

function applyAuthUI(user){
  if (user) {
    adminUnlocked = true;
    document.getElementById("adminBar").className = "abar unlocked";
    document.getElementById("adminLabel").textContent = "Admin mode";
    document.getElementById("adminBtns").innerHTML = `<button class="btn btn-sm btn-red" onclick="lockAdmin()">Lock</button>`;
  } else {
    adminUnlocked = false;
    document.getElementById("adminBar").className = "abar locked";
    document.getElementById("adminLabel").textContent = "Rep mode";
    document.getElementById("adminBtns").innerHTML = `<button class="btn btn-sm" onclick="openAdminPw()">Admin login</button>`;
  }
  fullRender();
}

window.addEventListener("firebase-ready", () => {
  window.firebaseFns.onAuthStateChanged(window.firebaseAuth, applyAuthUI);
  loadDataFromCloud();
  window.firebaseFns.onValue(window.firebaseFns.ref(window.firebaseDb, "portalData"), (snapshot) => {
    if (snapshot.exists()) {
      appData = snapshot.val();
      fullRender();
    }
  });
});

fullRender();
</script>
</body>
</html>
