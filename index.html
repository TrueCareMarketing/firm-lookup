<script>
let appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
let adminUnlocked = false;
let search = "";
let curState = null;
let editDraft = null;
let stateDraft = null;
let modalMode = null;
let searchMode = "state";
let suppressRealtime = false;

function cleanMinorText(v) {
  return String(v || "")
    .replace(/No minors unless catastrophic\.?/gi, "")
    .replace(/\s{2,}/g, " ")
    .trim();
}

function makeSafeFirm(f) {
  return {
    id: f?.id || ("f" + Date.now() + Math.random().toString(36).slice(2, 5)),
    name: f?.name || "Unnamed Firm",
    pronunciation: f?.pronunciation || "",
    accepting: typeof f?.accepting === "boolean" ? f.accepting : true,
    priority: f?.priority || "High",
    minors: "16 Years Old",
    marketing: f?.marketing || "",
    minPD: f?.minPD || "",
    trtNoTrt: f?.trtNoTrt || "",
    trtWithTrt: f?.trtWithTrt || "",
    geographic: f?.geographic || "",
    requirements: cleanMinorText(f?.requirements),
    exclusions: cleanMinorText(f?.exclusions),
    contact: f?.contact || "",
    notes: cleanMinorText(f?.notes),
    faultType: f?.faultType || "",
    keyThreshold: f?.keyThreshold || "",
    signWhen: f?.signWhen || "",
    doNotSign: f?.doNotSign || "",
    disqualifiers: f?.disqualifiers || "",
    lastUpdated: f?.lastUpdated || ""
  };
}

function normalizeAppData(data) {
  if (!data || typeof data !== "object" || Array.isArray(data)) {
    return JSON.parse(JSON.stringify(DEFAULT_DATA));
  }

  const out = {};
  for (const [stateName, raw] of Object.entries(data)) {
    const s = raw && typeof raw === "object" && !Array.isArray(raw) ? raw : {};
    const firms = Array.isArray(s.firms) ? s.firms.map(makeSafeFirm) : [];

    out[stateName] = {
      abbr: s.abbr || stateName.slice(0, 2).toUpperCase(),
      notes: s.notes || "",
      stateFaultType: s.stateFaultType || "",
      stateKeyThreshold: s.stateKeyThreshold || "",
      stateSignWhen: s.stateSignWhen || "",
      stateDoNotSign: s.stateDoNotSign || "",
      stateDisqualifiers: s.stateDisqualifiers || "",
      firms
    };
  }

  return Object.keys(out).length ? out : JSON.parse(JSON.stringify(DEFAULT_DATA));
}

function totalFirmCount(data) {
  return Object.values(data || {}).reduce((sum, state) => {
    return sum + ((state && Array.isArray(state.firms)) ? state.firms.length : 0);
  }, 0);
}

function isValidPortalData(data) {
  if (!data || typeof data !== "object" || Array.isArray(data)) return false;
  const states = Object.keys(data);
  if (!states.length) return false;
  return states.every(k => data[k] && Array.isArray(data[k].firms));
}

function defaultPortalData() {
  return normalizeAppData(JSON.parse(JSON.stringify(DEFAULT_DATA)));
}

function updateCounter() {
  const el = document.getElementById("counterDisplay");
  if (el) {
    const nS = Object.keys(appData || {}).length;
    el.textContent = nS + " states";
  }
}

function uid() {
  return "f" + Date.now() + Math.random().toString(36).slice(2, 5);
}

function pb(p) {
  if (p === "High") return '<span class="badge b-green">High priority</span>';
  if (p === "Medium") return '<span class="badge b-blue">Medium priority</span>';
  return '<span class="badge b-gray">' + (p || "") + '</span>';
}

function ab(a) {
  return a ? '<span class="badge b-green">Accepting</span>' : '<span class="badge b-red">Closed</span>';
}

function mb(m) {
  if (!m) return "";
  if (String(m).includes("16")) return '<span class="badge b-amber">16+ only</span>';
  return "";
}

async function loadDataFromCloud() {
  const { ref, get, set } = window.firebaseFns;
  const db = window.firebaseDb;

  try {
    const snapshot = await get(ref(db, "portalData"));
    if (snapshot.exists() && isValidPortalData(snapshot.val())) {
      appData = normalizeAppData(snapshot.val());
    } else {
      appData = defaultPortalData();
      await set(ref(db, "portalData"), appData);
    }
  } catch (err) {
    console.error("Load failed:", err);
    appData = defaultPortalData();
  }

  if (!curState || !appData[curState]) {
    curState = Object.keys(appData)[0] || null;
  }

  fullRender();
}

async function saveData() {
  const { ref, set } = window.firebaseFns;
  const db = window.firebaseDb;
  suppressRealtime = true;

  try {
    await set(ref(db, "portalData"), normalizeAppData(appData));
    const btn = document.getElementById("exportBtn");
    if (btn) {
      const old = btn.textContent;
      btn.textContent = "✓ Saved";
      setTimeout(() => {
        btn.textContent = old;
      }, 1500);
    }
  } catch (err) {
    console.error("Save failed:", err);
    alert("Could not save changes.");
  } finally {
    setTimeout(() => {
      suppressRealtime = false;
    }, 500);
  }
}
window.saveData = saveData;

function contactVal(v, label) {
  if (label !== "Contact / link") return `<div class="req-val">${v}</div>`;
  const isUrl = /^https?:\/\//i.test(v) || /^www\./i.test(v);
  const href = v.startsWith("http") ? v : "https://" + v;
  return isUrl
    ? `<div class="req-val"><a href="${href}" target="_blank" rel="noopener" style="color:#7ab0d8;text-decoration:underline;">${v}</a></div>`
    : `<div class="req-val">${v}</div>`;
}

function firmCard(rawFirm, stateKey) {
  const f = makeSafeFirm(rawFirm);

  const adminBtns = adminUnlocked
    ? `<div style="display:flex;gap:5px;margin-left:8px;" onclick="event.stopPropagation()">
         <button class="btn btn-sm btn-blue" onclick="openEditFirm('${stateKey}','${f.id}')">Edit</button>
         <button class="btn btn-sm btn-red" onclick="deleteFirm('${stateKey}','${f.id}')">Remove</button>
       </div>`
    : "";

  const rows = [
    [f.minPD, "Min. property damage"],
    [f.trtNoTrt, "No treatment window"],
    [f.trtWithTrt, "With treatment window"],
    [f.geographic, "Geographic coverage"],
    [f.requirements, "Requirements"],
    [f.exclusions, "Exclusions"],
    [f.marketing, "Intake Source"],
    [f.contact, "Contact / link"]
  ].filter(r => r[0]);

  const updatedLine = f.lastUpdated ? `<div class="firm-updated">Updated: ${f.lastUpdated}</div>` : "";
  const speakBtn = f.pronunciation
    ? `<button class="speak-btn" data-id="${f.id}" title="Hear pronunciation" onclick="event.stopPropagation();speakFirm('${f.id}', \`${String(f.pronunciation).replace(/`/g, "'")}\`)">🔊</button>`
    : "";

  const extraSections = [
    ["Fault Type", f.faultType],
    ["Key Threshold", f.keyThreshold],
    ["Sign the Lead When", f.signWhen],
    ["Do Not Sign When", f.doNotSign],
    ["State-Specific Disqualifiers", f.disqualifiers]
  ].filter(([, v]) => v);

  return `<div class="firm-card${f.accepting ? "" : " closed"}">
    <div class="firm-card-header">
      <div class="firm-header-left">
        <span class="firm-collapse-icon">▶</span>
        <div><div class="firm-name">${f.name}${speakBtn}</div>${updatedLine}</div>
      </div>
      <div style="display:flex;align-items:center;gap:4px;">
        <div class="badges">${pb(f.priority)}${ab(f.accepting)}${mb(f.minors)}</div>
        ${adminBtns}
      </div>
    </div>
    <div class="firm-card-body">
      <div class="req-grid" style="margin-top:12px;">
        ${rows.map(([v, l]) => `<div class="req"><div class="req-lbl">${l}</div>${contactVal(v, l)}</div>`).join("")}
      </div>
      ${f.notes ? `<div class="rep-note"><strong>Rep note:</strong> ${f.notes}</div>` : ""}
      ${extraSections.map(([l, v]) => `<div class="firm-section"><div class="firm-section-title">${l}</div><div class="firm-section-val">${v}</div></div>`).join("")}
    </div>
  </div>`;
}

function stateMapEmbed(stateName) {
  const q = encodeURIComponent(stateName + ", USA");
  return `<div class="state-map-wrap"><iframe src="https://maps.google.com/maps?q=${q}&z=5&output=embed" loading="lazy" title="${stateName} map"></iframe></div>`;
}

function renderFirmList() {
  const q = search.toLowerCase().trim();
  if (!q) return `<div class="firm-result-empty">Type a firm name to search</div>`;

  const results = [];
  Object.keys(appData).sort().forEach(stateName => {
    const state = appData[stateName];
    const matched = (state.firms || []).map(makeSafeFirm).filter(f => f.name.toLowerCase().includes(q));
    if (matched.length) results.push({ stateName, firms: matched });
  });

  if (!results.length) return `<div class="firm-result-empty">No firms match "${search}"</div>`;

  const totalFirms = results.reduce((a, r) => a + r.firms.length, 0);

  return `<p class="hint">${totalFirms} firm${totalFirms !== 1 ? "s" : ""} in ${results.length} state${results.length !== 1 ? "s" : ""}</p>` +
    results.map(({ stateName, firms }) =>
      `<div class="firm-result-group">
        <div class="firm-result-state-label" onclick="viewState('${stateName}');setSearchMode('state');">${appData[stateName].abbr} — ${stateName}</div>
        ${firms.map(f => firmCard(f, stateName)).join("")}
      </div>`
    ).join("");
}

function renderList() {
  if (searchMode === "firm") return renderFirmList();

  const sorted = Object.keys(appData).sort();
  const q = search.toLowerCase();
  const filtered = q
    ? sorted.filter(s => s.toLowerCase().includes(q) || appData[s].abbr.toLowerCase() === q)
    : sorted;

  if (!filtered.length) return `<div class="no-result">No states match</div>`;

  const rows = filtered.map(s => {
    const activeClass = curState === s ? " active-state" : "";
    return `<div class="state-row${activeClass}" onclick="viewState('${s}')">
      <div class="sr-left"><span class="sr-abbr">${appData[s].abbr}</span><span class="sr-name">${s}</span></div>
      <div class="sr-right"><span class="sr-arrow">›</span></div>
    </div>`;
  }).join("");

  const addBtn = adminUnlocked
    ? `<div style="margin-top:10px;"><button class="btn btn-blue btn-sm" onclick="openAddState()">+ Add state</button></div>`
    : "";

  return `<p class="hint">${filtered.length} states</p>${rows}${addBtn}`;
}

function renderDetail(key) {
  if (!key || !appData[key]) {
    return `<div class="empty-state"><div class="empty-icon">◈</div><div class="empty-title">Select a state</div><div class="empty-sub">Click any state on the left to view firms and requirements</div></div>`;
  }

  const s = appData[key];
  const firms = Array.isArray(s.firms) ? s.firms.map(makeSafeFirm) : [];
  const active = firms.filter(f => f.accepting);
  const closed = firms.filter(f => !f.accepting);

  const adminBtns = adminUnlocked
    ? `<div class="right-admin-bar">
         <button class="btn btn-sm" onclick="openEditState('${key}')">Edit state</button>
         <button class="btn btn-sm btn-blue" onclick="openAddFirm('${key}')">+ Add firm</button>
       </div>`
    : "";

  let infoHtml;
  if (adminUnlocked) {
    infoHtml = `<div class="state-info-grid">
      <div class="state-info-block"><div class="sib-label">Fault Type</div><textarea id="inlineStateFaultType">${s.stateFaultType || ""}</textarea><div class="sib-save-row"><span>Admin edit</span><button class="btn btn-sm btn-green" onclick="saveInlineField('${key}','stateFaultType','inlineStateFaultType')">Save</button></div></div>
      <div class="state-info-block"><div class="sib-label">Key Threshold</div><textarea id="inlineStateKeyThreshold">${s.stateKeyThreshold || ""}</textarea><div class="sib-save-row"><span>Admin edit</span><button class="btn btn-sm btn-green" onclick="saveInlineField('${key}','stateKeyThreshold','inlineStateKeyThreshold')">Save</button></div></div>
      <div class="state-info-block"><div class="sib-label">Sign the Lead When</div><textarea id="inlineStateSignWhen">${s.stateSignWhen || ""}</textarea><div class="sib-save-row"><span>Admin edit</span><button class="btn btn-sm btn-green" onclick="saveInlineField('${key}','stateSignWhen','inlineStateSignWhen')">Save</button></div></div>
      <div class="state-info-block"><div class="sib-label">Do Not Sign When</div><textarea id="inlineStateDoNotSign">${s.stateDoNotSign || ""}</textarea><div class="sib-save-row"><span>Admin edit</span><button class="btn btn-sm btn-green" onclick="saveInlineField('${key}','stateDoNotSign','inlineStateDoNotSign')">Save</button></div></div>
      <div class="state-info-block"><div class="sib-label">State-Specific Disqualifiers</div><textarea id="inlineStateDisqualifiers">${s.stateDisqualifiers || ""}</textarea><div class="sib-save-row"><span>Admin edit</span><button class="btn btn-sm btn-green" onclick="saveInlineField('${key}','stateDisqualifiers','inlineStateDisqualifiers')">Save</button></div></div>
    </div>`;
  } else {
    const sfv = v => v ? `<div class="sib-value">${v}</div>` : `<div class="sib-value empty">Not set</div>`;
    infoHtml = `<div class="state-info-grid">
      <div class="state-info-block"><div class="sib-label">Fault Type</div>${sfv(s.stateFaultType)}</div>
      <div class="state-info-block"><div class="sib-label">Key Threshold</div>${sfv(s.stateKeyThreshold)}</div>
      <div class="state-info-block"><div class="sib-label">Sign the Lead When</div>${sfv(s.stateSignWhen)}</div>
      <div class="state-info-block"><div class="sib-label">Do Not Sign When</div>${sfv(s.stateDoNotSign)}</div>
      <div class="state-info-block"><div class="sib-label">State-Specific Disqualifiers</div>${sfv(s.stateDisqualifiers)}</div>
    </div>`;
  }

  return `<div class="state-header"><span class="sname">${key} (${s.abbr})</span></div>
    ${stateMapEmbed(key)}
    ${infoHtml}
    ${adminBtns}
    ${active.length ? `<div class="sec-title">Accepting leads</div>` + active.map(f => firmCard(f, key)).join("") : ""}
    ${closed.length ? `<div class="sec-title">Not currently accepting</div>` + closed.map(f => firmCard(f, key)).join("") : ""}
    ${!active.length && !closed.length ? `<div class="no-result" style="margin-top:24px;">No firms assigned yet.</div>` : ""}`;
}

function buildModal() {
  if (!modalMode) return "";

  if (modalMode === "pw") {
    return `<div class="overlay" id="ov" onclick="if(event.target.id==='ov')closeModal()">
      <div class="modal">
        <h2>Admin login</h2>
        <div class="field">
          <label>Password</label>
          <input type="password" id="pwf" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')submitPw()"/>
          <small class="helper">Uses your Firebase email/password account.</small>
        </div>
        <div class="err" id="pwerr"></div>
        <div class="modal-footer">
          <button class="btn" onclick="closeModal()">Cancel</button>
          <button class="btn btn-green" onclick="submitPw()">Unlock</button>
        </div>
      </div>
    </div>`;
  }

  if (modalMode === "firm" && editDraft) {
    const d = editDraft;
    const fields = [
      ["name","Firm name","text"],
      ["pronunciation","Pronunciation (phonetic)","text"],
      ["minPD","Min. property damage","text"],
      ["trtNoTrt","No treatment window","text"],
      ["trtWithTrt","With treatment window","text"],
      ["geographic","Geographic coverage","text"],
      ["requirements","Requirements","textarea"],
      ["exclusions","Exclusions","text"],
      ["marketing","Intake Source","text"],
      ["contact","Contact / link","text"],
      ["notes","Rep note","textarea"],
      ["faultType","Fault Type","textarea"],
      ["keyThreshold","Key Threshold","textarea"],
      ["signWhen","Sign the Lead When","textarea"],
      ["doNotSign","Do Not Sign When","textarea"],
      ["disqualifiers","State-Specific Disqualifiers","textarea"],
      ["lastUpdated","Last Updated","text"]
    ];

    return `<div class="overlay" id="ov" onclick="if(event.target.id==='ov')closeModal()">
      <div class="modal">
        <h2>${d._new ? "Add firm" : "Edit firm"}</h2>
        <div class="two-col">
          <div class="field"><label>Status</label><select id="ef_a"><option value="true" ${d.accepting !== false ? "selected" : ""}>Accepting</option><option value="false" ${d.accepting === false ? "selected" : ""}>Not accepting</option></select></div>
          <div class="field"><label>Priority</label><select id="ef_p">${["High","Medium","Paused"].map(p => `<option ${d.priority === p ? "selected" : ""}>${p}</option>`).join("")}</select></div>
        </div>
        <div class="field"><label>Minor policy</label><select id="ef_m"><option value="16 Years Old" selected>16 Years Old</option></select></div>
        ${fields.map(([k,l,t]) => `<div class="field"><label>${l}</label>${t === "textarea" ? `<textarea id="ef_${k}">${d[k] || ""}</textarea>` : `<input type="text" id="ef_${k}" value="${String(d[k] || "").replace(/"/g, "&quot;")}"/>`}</div>`).join("")}
        <div class="modal-footer">
          <button class="btn" onclick="closeModal()">Cancel</button>
          <button class="btn btn-green" onclick="saveFirmEdit()">Save</button>
        </div>
      </div>
    </div>`;
  }

  if (modalMode === "state" && stateDraft) {
    return `<div class="overlay" id="ov" onclick="if(event.target.id==='ov')closeModal()">
      <div class="modal">
        <h2>Edit state</h2>
        <div class="two-col">
          <div class="field"><label>State name</label><input type="text" id="es_n" value="${stateDraft.key}"/></div>
          <div class="field"><label>Abbreviation</label><input type="text" id="es_a" value="${stateDraft.abbr}"/></div>
        </div>
        <div class="field"><label>Fault Type</label><textarea id="es_sft">${stateDraft.stateFaultType || ""}</textarea></div>
        <div class="field"><label>Key Threshold</label><textarea id="es_skt">${stateDraft.stateKeyThreshold || ""}</textarea></div>
        <div class="field"><label>Sign the Lead When</label><textarea id="es_ssw">${stateDraft.stateSignWhen || ""}</textarea></div>
        <div class="field"><label>Do Not Sign When</label><textarea id="es_sdns">${stateDraft.stateDoNotSign || ""}</textarea></div>
        <div class="field"><label>State-Specific Disqualifiers</label><textarea id="es_sdq">${stateDraft.stateDisqualifiers || ""}</textarea></div>
        <div class="modal-footer">
          <button class="btn btn-red" onclick="deleteState('${stateDraft.key}')">Delete state</button>
          <button class="btn" onclick="closeModal()">Cancel</button>
          <button class="btn btn-green" onclick="saveStateEdit('${stateDraft.key}')">Save</button>
        </div>
      </div>
    </div>`;
  }

  if (modalMode === "addstate") {
    return `<div class="overlay" id="ov" onclick="if(event.target.id==='ov')closeModal()">
      <div class="modal">
        <h2>Add new state</h2>
        <div class="two-col">
          <div class="field"><label>State name</label><input type="text" id="as_n" placeholder="e.g. Michigan"/></div>
          <div class="field"><label>Abbreviation</label><input type="text" id="as_a" placeholder="e.g. MI"/></div>
        </div>
        <div class="field"><label>Fault Type</label><textarea id="as_sft"></textarea></div>
        <div class="field"><label>Key Threshold</label><textarea id="as_skt"></textarea></div>
        <div class="field"><label>Sign the Lead When</label><textarea id="as_ssw"></textarea></div>
        <div class="field"><label>Do Not Sign When</label><textarea id="as_sdns"></textarea></div>
        <div class="field"><label>State-Specific Disqualifiers</label><textarea id="as_sdq"></textarea></div>
        <div class="modal-footer">
          <button class="btn" onclick="closeModal()">Cancel</button>
          <button class="btn btn-green" onclick="addState()">Add state</button>
        </div>
      </div>
    </div>`;
  }

  return "";
}

function fullRender() {
  const listEl = document.getElementById("stateList");
  const detailEl = document.getElementById("detailPanel");
  if (listEl) listEl.innerHTML = renderList();
  if (detailEl) detailEl.innerHTML = renderDetail(curState);
  const modalRoot = document.getElementById("modalRoot");
  if (modalRoot) modalRoot.innerHTML = buildModal();
  updateCounter();

  const sb = document.getElementById("modeStateBtn");
  const fb = document.getElementById("modeFirmBtn");
  if (sb) sb.className = "mode-btn" + (searchMode === "state" ? " active" : "");
  if (fb) fb.className = "mode-btn" + (searchMode === "firm" ? " active" : "");

  const saveBtn = document.getElementById("exportBtn");
  if (saveBtn) saveBtn.classList.toggle("visible", adminUnlocked);

  if (modalMode === "pw") {
    setTimeout(() => {
      const f = document.getElementById("pwf");
      if (f) f.focus();
    }, 30);
  }
}

function setSearchMode(mode) {
  searchMode = mode;
  search = "";
  const inp = document.getElementById("searchInput");
  if (inp) {
    inp.value = "";
    inp.placeholder = mode === "firm" ? "Search law firms…" : "Search states…";
  }
  fullRender();
}
window.setSearchMode = setSearchMode;

function handleSearch(v) {
  search = v;
  fullRender();
}
window.handleSearch = handleSearch;

function viewState(s) {
  if (!s || !appData[s]) return;
  curState = s;
  fullRender();
}
window.viewState = viewState;

function openAdminPw() {
  modalMode = "pw";
  fullRender();
}
window.openAdminPw = openAdminPw;

function closeModal() {
  modalMode = null;
  editDraft = null;
  stateDraft = null;
  fullRender();
}
window.closeModal = closeModal;

async function submitPw() {
  const email = window.ADMIN_EMAIL || "PASTE_YOUR_ADMIN_EMAIL";
  const password = document.getElementById("pwf").value;
  try {
    await window.firebaseFns.signInWithEmailAndPassword(window.firebaseAuth, email, password);
    modalMode = null;
    fullRender();
  } catch (err) {
    document.getElementById("pwerr").textContent = "Incorrect password or Firebase login not configured.";
  }
}
window.submitPw = submitPw;

function lockAdmin() {
  window.firebaseFns.signOut(window.firebaseAuth);
}
window.lockAdmin = lockAdmin;

function openEditFirm(sk, id) {
  const found = (appData[sk]?.firms || []).find(f => makeSafeFirm(f).id === id);
  editDraft = Object.assign({ _sk: sk }, JSON.parse(JSON.stringify(makeSafeFirm(found || {}))));
  modalMode = "firm";
  fullRender();
}
window.openEditFirm = openEditFirm;

function saveFirmEdit() {
  const sk = editDraft._sk;
  const firms = appData[sk].firms || [];
  const idx = firms.findIndex(f => makeSafeFirm(f).id === editDraft.id);

  const u = {
    id: editDraft.id,
    name: document.getElementById("ef_name").value,
    pronunciation: document.getElementById("ef_pronunciation").value,
    accepting: document.getElementById("ef_a").value === "true",
    priority: document.getElementById("ef_p").value,
    minors: "16 Years Old",
    marketing: document.getElementById("ef_marketing").value,
    minPD: document.getElementById("ef_minPD").value,
    trtNoTrt: document.getElementById("ef_trtNoTrt").value,
    trtWithTrt: document.getElementById("ef_trtWithTrt").value,
    geographic: document.getElementById("ef_geographic").value,
    requirements: cleanMinorText(document.getElementById("ef_requirements").value),
    exclusions: cleanMinorText(document.getElementById("ef_exclusions").value),
    contact: document.getElementById("ef_contact").value,
    notes: cleanMinorText(document.getElementById("ef_notes").value),
    faultType: document.getElementById("ef_faultType").value,
    keyThreshold: document.getElementById("ef_keyThreshold").value,
    signWhen: document.getElementById("ef_signWhen").value,
    doNotSign: document.getElementById("ef_doNotSign").value,
    disqualifiers: document.getElementById("ef_disqualifiers").value,
    lastUpdated: document.getElementById("ef_lastUpdated").value
  };

  if (idx > -1) firms[idx] = u;
  else firms.push(u);

  appData[sk].firms = firms;
  saveData();
  closeModal();
}

function deleteFirm(sk, id) {

  fullRender();
}

let _speakTimer = null;
function speakFirm(id, text) {
  window.speechSynthesis.cancel();
  const btn = document.querySelector('.speak-btn[data-id="' + id + '"]');
  if (btn) {
    btn.classList.add("speaking");
    clearTimeout(_speakTimer);
    _speakTimer = setTimeout(() => btn.classList.remove("speaking"), 4000);
  }
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.85;
  u.pitch = 1;
  u.onend = () => { if (btn) btn.classList.remove("speaking"); };
  window.speechSynthesis.speak(u);
}
window.speakFirm = speakFirm;

(function () {
  const resizer = document.getElementById("resizer");
  const left = document.getElementById("panelLeft");
  if (!resizer || !left) return;

  let dragging = false, startX = 0, startW = 0;
  resizer.addEventListener("mousedown", e => {
    dragging = true;
    startX = e.clientX;
    startW = left.offsetWidth;
    resizer.classList.add("dragging");
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";
  });

  document.addEventListener("mousemove", e => {
    if (!dragging) return;
    const w = Math.min(Math.max(startW + (e.clientX - startX), 180), 520);
    left.style.width = w + "px";
  });

  document.addEventListener("mouseup", () => {
    if (!dragging) return;
    dragging = false;
    resizer.classList.remove("dragging");
    document.body.style.cursor = "";
    document.body.style.userSelect = "";
  });
})();

let lastAdminState = null;
function applyAuthUI(user) {
  const nextAdminState = !!user;
  if (lastAdminState === nextAdminState) return;
  lastAdminState = nextAdminState;
  adminUnlocked = nextAdminState;

  const adminBar = document.getElementById("adminBar");
  const adminLabel = document.getElementById("adminLabel");
  const adminBtns = document.getElementById("adminBtns");

  if (adminBar && adminLabel && adminBtns) {
    if (nextAdminState) {
      adminBar.className = "abar unlocked";
      adminLabel.textContent = "Admin mode";
      adminBtns.innerHTML = `<button class="btn btn-sm btn-red" onclick="lockAdmin()">Lock</button>`;
    } else {
      adminBar.className = "abar locked";
      adminLabel.textContent = "Rep mode";
      adminBtns.innerHTML = `<button class="btn btn-sm" onclick="openAdminPw()">Admin login</button>`;
    }
  }

  fullRender();
}

window.addEventListener("firebase-ready", () => {
  window.firebaseFns.onAuthStateChanged(window.firebaseAuth, applyAuthUI);

  window.firebaseFns.onValue(window.firebaseFns.ref(window.firebaseDb, "portalData"), (snapshot) => {
    if (suppressRealtime) return;

    if (snapshot.exists() && isValidPortalData(snapshot.val())) {
      const incoming = normalizeAppData(snapshot.val());
      appData = incoming;
      if (!curState || !appData[curState]) {
        curState = Object.keys(appData)[0] || null;
      }
      fullRender();
    }
  });

  loadDataFromCloud();
});

fullRender();
